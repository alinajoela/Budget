<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --card: #1C1C1C;
            --border: #2A2A2A;
            --text: #F0EDE8;
            --muted: #888;
            --accent: #C8B89A;
            --green: #4CAF7D;
            --yellow: #E8B84B;
            --red: #E05252;
            --dim: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        input[type=number], input[type=text], textarea {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            font-family: 'DM Mono', monospace; font-size: 13px; padding: 6px 10px;
            border-radius: 6px; outline: none; width: 100%; transition: border-color 0.15s;
        }
        input[type=number]:focus, input[type=text]:focus, textarea:focus { border-color: var(--accent); }
        button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }
        .container { background: var(--bg); min-height: 100vh; max-width: 480px; margin: 0 auto; }
        .header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; }
        .month-nav button { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px 8px; cursor: pointer; }
        .month-display { text-align: center; }
        .month-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
        .month-status { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .month-status.saved { color: var(--green); }
        .free-to-spend { padding: 0 20px 14px; text-align: center; }
        .free-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .free-amount { font-family: 'DM Serif Display', serif; font-size: 44px; font-weight: 400; line-height: 1; margin-bottom: 4px; }
        .free-amount.positive { color: var(--green); }
        .free-amount.negative { color: var(--red); }
        .free-buffer { font-size: 11px; color: var(--muted); margin-top: 4px; }
        .free-buffer span { color: var(--accent); }
        .free-buffer span.negative { color: var(--red); }
        .tabs { display: flex; border-top: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--muted); font-size: 13px; padding: 8px 16px; border-bottom: 2px solid transparent; transition: all 0.15s; flex: 1; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:hover:not(.active) { color: var(--text); }
        .content { padding: 16px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .section-title { font-family: 'DM Serif Display', serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
        .progress-fill.green { background: var(--green); }
        .progress-fill.yellow { background: var(--yellow); }
        .progress-fill.red { background: var(--red); }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 6px; }
        .dot.green { background: var(--green); }
        .dot.yellow { background: var(--yellow); }
        .dot.red { background: var(--red); }
        .dot.none { background: var(--dim); }
        .overview-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .overview-card { padding: 12px; }
        .overview-label { font-size: 9px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.07em; }
        .overview-amount { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; margin-bottom: 2px; }
        .overview-budget { font-size: 9px; color: var(--dim); margin-top: 2px; }
        .row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .row-between.vertical { align-items: flex-start; }
        .row-start { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .cat-icon { font-size: 18px; }
        .cat-info div:first-child { font-size: 13px; font-weight: 500; }
        .cat-info div:last-child { font-size: 11px; color: var(--muted); margin-top: 1px; }
        .cat-info.over div:last-child { color: var(--red); }
        .category-list { display: flex; flex-direction: column; gap: 8px; }
        .category-item { display: flex; align-items: center; gap: 10px; }
        .category-amount { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
        .category-amount span { color: var(--dim); }
        .one-time-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .add-btn { background: rgba(200, 184, 154, 0.13); border: none; color: var(--accent); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
        .one-time-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .one-time-item input:first-child { flex: 2; }
        .one-time-item input:nth-child(2) { flex: 1; text-align: right; }
        .one-time-item button { background: none; border: none; color: var(--red); font-size: 16px; padding: 0 4px; cursor: pointer; }
        .one-time-total { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); margin-top: 4px; }
        textarea { resize: vertical; font-size: 12px; line-height: 1.6; }
        .fixed-item, .income-item, .savings-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; margin-bottom: 8px; }
        .item-icon { font-size: 18px; flex-shrink: 0; width: 20px; }
        .item-label { flex: 1; font-size: 13px; word-break: break-word; }
        .item-label small { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; }
        .item-input { width: 60px; text-align: right; font-family: 'DM Mono', monospace; font-size: 13px; flex-shrink: 0; }
        .item-currency { color: var(--muted); font-size: 12px; flex-shrink: 0; }
        .total-line { text-align: right; padding: 8px 4px; margin-bottom: 12px; }
        .total-line span:first-child { font-size: 12px; color: var(--muted); }
        .total-line span:last-child { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--accent); font-weight: 500; }
        .savings-header { margin-top: 20px; margin-bottom: 10px; }
        .savings-footer { display: flex; justify-content: space-between; padding: 4px 0 16px; font-size: 12px; color: var(--muted); }
        .income-breakdown { margin-bottom: 10px; }
        .breakdown-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .breakdown-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .breakdown-fill { height: 100%; border-radius: 3px; }
        .spend-hint { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
        .spending-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .spending-col { flex: 1; min-width: 0; }
        .spending-col-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
        .spending-col input { width: 60px !important; }
        .compare-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .compare-label { font-size: 13px; color: var(--muted); width: 100px; }
        .compare-values { display: flex; align-items: center; gap: 16px; }
        .compare-values span { font-family: 'DM Mono', monospace; font-size: 12px; }
        .compare-prev { color: var(--muted); }
        .compare-curr { font-size: 13px; color: var(--text); }
        .compare-diff { font-size: 11px; width: 50px; text-align: right; }
        .category-compare { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .cat-compare-icon { font-size: 15px; width: 22px; }
        .cat-compare-label { font-size: 12px; flex: 1; }
        .loading { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); flex-direction: column; gap: 12px; }
        .loading-icon { font-size: 28px; }
        .loading-text { color: var(--muted); font-size: 13px; }
        .bottom-padding { height: 32px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="month-nav">
                <button onclick="prevMonth()">&lsaquo;</button>
                <div class="month-display">
                    <div class="month-title" id="monthTitle">May 2026</div>
                    <div class="month-status" id="monthStatus"></div>
                </div>
                <button onclick="nextMonth()">&rsaquo;</button>
            </div>
            <div class="free-to-spend">
                <div class="free-label">Free to spend</div>
                <div class="free-amount" id="freeAmount">€0</div>
                <div class="free-buffer">
                    Budgeted buffer: <span id="budgetedFree">€0</span>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="setTab('overview')">Overview</button>
                <button class="tab-btn" onclick="setTab('variable')">Spending</button>
                <button class="tab-btn" onclick="setTab('fixed')">Fixed</button>
                <button class="tab-btn" onclick="setTab('income')">Income</button>
                <button class="tab-btn" onclick="setTab('compare')">vs last month</button>
            </div>
        </div>
        <div class="content" id="content"></div>
        <div class="bottom-padding"></div>
    </div>

    <script>
        const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const INCOME_DEFAULTS = { salary: 3147, maternity: 4261, childBenefit: 160, rental: 800 };
        const FIXED_DEFAULTS = [
            { id:"loans", label:"Loans (2,022 + 160)", icon:"🏦", amount:2182 },
            { id:"hoa", label:"HOA + utilities (avg)", icon:"🏠", amount:750 },
            { id:"insurance", label:"Insurance (life ×2 + P&C)", icon:"🛡️", amount:218 },
            { id:"car_lease", label:"Car lease (Coop)", icon:"🚗", amount:243.48 },
            { id:"fuel", label:"Fuel", icon:"⛽", amount:150 },
            { id:"nanny", label:"Nanny — Natalja", icon:"👶", amount:400 },
            { id:"cleaner", label:"Cleaner", icon:"🧹", amount:100 },
            { id:"activities", label:"Kids activities + kindergarten", icon:"🩰", amount:164 },
            { id:"allowances", label:"Alexa + Leon allowances", icon:"🎒", amount:160 },
            { id:"pharmacy", label:"Pharmacy", icon:"💊", amount:100 },
            { id:"subs", label:"Subscriptions", icon:"📱", amount:17 },
        ];
        const VAR_CATEGORIES = [
            { id:"groceries", label:"Groceries", icon:"🛒", budget:700, bucket:"50" },
            { id:"restaurants", label:"Restaurants + delivery", icon:"🍽️", budget:300, bucket:"30" },
            { id:"shopping", label:"Shopping — Alina", icon:"👗", budget:300, bucket:"30" },
            { id:"beauty", label:"Beauty — Alina", icon:"💄", budget:110, bucket:"30" },
            { id:"ken_cash", label:"Ken cash", icon:"💸", budget:100, bucket:"30" },
            { id:"gifts", label:"Gifts", icon:"🎁", budget:100, bucket:"30" },
            { id:"home_misc", label:"Home misc", icon:"🔨", budget:164, bucket:"30" },
            { id:"kids_extra", label:"Kids extra", icon:"👧", budget:60, bucket:"30" },
        ];
        const SAVINGS_DEFAULTS = [
            { id:"travel", label:"Travel fund", icon:"✈️", amount:1000 },
            { id:"alina", label:"Alina savings", icon:"💰", amount:250 },
            { id:"ken", label:"Ken savings", icon:"💰", amount:200 },
            { id:"pension", label:"Pension ×2", icon:"🏛️", amount:600 },
        ];

        let now = new Date();
        let year = now.getFullYear();
        let month = now.getMonth();
        let currentTab = "overview";
        let data = emptyMonthData();
        let prevData = null;
        let loaded = false;
        let saved = false;

        function monthKey(y, m) { return `budget:${y}-${String(m+1).padStart(2,"0")}`; }
        function emptyMonthData() {
            const spending = {};
            VAR_CATEGORIES.forEach(c => { spending[c.id] = "" });
            return { income: {...INCOME_DEFAULTS}, fixed: FIXED_DEFAULTS.map(f => ({...f})), savings: SAVINGS_DEFAULTS.map(s => ({...s})), varBudgets: Object.fromEntries(VAR_CATEGORIES.map(c => [c.id, c.budget])), spending, notes: "", oneTime: [], updatedAt: null };
        }
        function fmt(n) { return new Intl.NumberFormat("et-EE", { minimumFractionDigits:0, maximumFractionDigits:0 }).format(n); }
        function fmtD(n) { const abs = Math.abs(n); const str = new Intl.NumberFormat("et-EE", { minimumFractionDigits:2, maximumFractionDigits:2 }).format(abs); return (n < 0 ? "-" : "") + str; }
        function trafficLight(actual, budget) { if (!budget || budget === 0) return actual > 0 ? "over" : "none"; const p = actual / budget; if (p <= 0.75) return "green"; if (p <= 1.0) return "yellow"; return "over"; }
        function pct(actual, budget) { if (!budget) return 0; return Math.min((actual / budget) * 100, 100); }

        function load() {
            try { const r = localStorage.getItem(monthKey(year, month)); if (r) data = JSON.parse(r); else data = emptyMonthData(); } catch { data = emptyMonthData(); }
            const pm = month === 0 ? 11 : month - 1;
            const py = month === 0 ? year - 1 : year;
            try { const r2 = localStorage.getItem(monthKey(py, pm)); if (r2) prevData = JSON.parse(r2); else prevData = null; } catch { prevData = null; }
            loaded = true;
            updateUI();
        }

        function save() {
            try {
                localStorage.setItem(monthKey(year, month), JSON.stringify({...data, updatedAt: Date.now()}));
                saved = true;
                updateHeader();
                setTimeout(() => { saved = false; updateHeader(); }, 1500);
            } catch (e) { console.error(e); }
        }

        function updateData(newData) { data = newData; save(); updateUI(); }
        function prevMonth() { if (month === 0) { year--; month = 11; } else { month--; } loaded = false; load(); }
        function nextMonth() { const nm = month === 11 ? 0 : month + 1; const ny = month === 11 ? year + 1 : year; if (ny > now.getFullYear() || (ny === now.getFullYear() && nm > now.getMonth())) return; if (month === 11) { year++; month = 0; } else { month++; } loaded = false; load(); }

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                const tabs = ['overview','variable','fixed','income','compare'];
                btn.classList.toggle('active', tabs[i] === tab);
            });
            renderContent();
        }

        function updateHeader() {
            document.getElementById('monthTitle').textContent = `${MONTHS[month]} ${year}`;
            const statusEl = document.getElementById('monthStatus');
            if (saved) {
                statusEl.textContent = '✓ saved';
                statusEl.className = 'month-status saved';
            } else if (data.updatedAt) {
                statusEl.textContent = `updated ${new Date(data.updatedAt).toLocaleDateString("et-EE")}`;
                statusEl.className = 'month-status';
            }

            const totalIncome = Object.values(data.income).reduce((a,b) => a + (+b||0), 0);
            const totalFixed = data.fixed.reduce((a,f) => a + (+f.amount||0), 0);
            const totalVarSpent = VAR_CATEGORIES.reduce((a,c) => a + (+data.spending[c.id]||0), 0);
            const totalSavings = (data.savings || SAVINGS_DEFAULTS).reduce((a,s) => a + (+s.amount||0), 0);
            const oneTimeTotal = data.oneTime.reduce((a,x) => a + (+x.amount||0), 0);
            const freeToSpend = totalIncome - totalFixed - totalVarSpent - totalSavings - oneTimeTotal;

            const freeEl = document.getElementById('freeAmount');
            freeEl.textContent = (freeToSpend >= 0 ? "" : "−") + fmt(Math.abs(freeToSpend)) + " €";
            freeEl.className = 'free-amount ' + (freeToSpend >= 0 ? 'positive' : 'negative');

            const totalVarBudget = VAR_CATEGORIES.reduce((a,c) => a + (+data.varBudgets[c.id]||0), 0);
            const budgetedFree = totalIncome - totalFixed - totalVarBudget - totalSavings;
            document.getElementById('budgetedFree').textContent = fmt(budgetedFree) + " €";
            document.getElementById('budgetedFree').parentElement.className = 'free-buffer' + (budgetedFree > 0 ? '' : ' negative');
        }

        function renderContent() {
            const content = document.getElementById('content');
            if (!loaded) {
                content.innerHTML = '<div class="loading"><div class="loading-icon">💰</div><div class="loading-text">Loading...</div></div>';
                return;
            }
            if (currentTab === 'overview') renderOverview();
            else if (currentTab === 'variable') renderVariable();
            else if (currentTab === 'fixed') renderFixed();
            else if (currentTab === 'income') renderIncome();
            else if (currentTab === 'compare') renderCompare();
        }

        function renderOverview() {
            const totalIncome = Object.values(data.income).reduce((a,b) => a + (+b||0), 0);
            const totalFixed = data.fixed.reduce((a,f) => a + (+f.amount||0), 0);
            const totalSavings = (data.savings || SAVINGS_DEFAULTS).reduce((a,s) => a + (+s.amount||0), 0);
            const spending = data.spending;
            const varBudgets = data.varBudgets;
            const wants30cats = VAR_CATEGORIES.filter(c => c.id !== "groceries");
            const total30spent = wants30cats.reduce((a,c) => a + (+spending[c.id]||0), 0);
            const total30budget = wants30cats.reduce((a,c) => a + (+varBudgets[c.id]||0), 0);
            const groceriesSpent = +spending["groceries"] || 0;
            const totalVarSpent = VAR_CATEGORIES.reduce((a,c) => a + (+spending[c.id]||0), 0);
            const totalVarBudget = VAR_CATEGORIES.reduce((a,c) => a + (+varBudgets[c.id]||0), 0);
            const oneTimeTotal = data.oneTime.reduce((a,x) => a + (+x.amount||0), 0);

            let html = `<div class="overview-grid">`;
            [[["50% Needs", totalFixed + groceriesSpent, totalFixed + 700, "var(--accent)"],
            ["30% Wants", total30spent, total30budget, "var(--yellow)"],
            ["20% Savings", totalSavings, totalSavings, "var(--green)"]]].forEach(arr => {
                arr.forEach(([label, val, budget, color]) => {
                    const over = val > budget && !label.includes("Savings");
                    html += `<div class="card overview-card"><div class="overview-label">${label}</div><div class="overview-amount" style="color: ${over ? 'var(--red)' : color}">${fmt(val)}</div><div class="overview-budget">/ ${fmt(budget)}</div><div class="progress-bar"><div class="progress-fill ${label.includes("Savings") ? 'green' : trafficLight(val, budget)}" style="width: ${Math.min(pct(val, budget), 100)}%"></div></div></div>`;
                });
            });
            html += `</div><div class="card"><div class="section-title">Variable budget progress</div><div class="row-between"><span style="font-size: 12px; color: var(--muted)">Spent so far</span><span style="font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent)">${fmt(totalVarSpent)} / ${fmt(totalVarBudget)} €</span></div><div class="progress-bar"><div class="progress-fill ${trafficLight(totalVarSpent, totalVarBudget)}" style="width: ${Math.min(pct(totalVarSpent, totalVarBudget), 100)}%"></div></div><div class="row-between" style="margin-top: 8px"><span style="font-size: 11px; color: var(--muted)">Remaining in variable</span><span style="font-family: 'DM Mono', monospace; font-size: 11px; color: ${totalVarBudget - totalVarSpent >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(totalVarBudget - totalVarSpent)} €</span></div></div>`;
            html += `<div class="card"><div class="section-title">Categories at a glance</div><div class="category-list">`;
            VAR_CATEGORIES.forEach(cat => {
                const spent = +spending[cat.id] || 0;
                const budget = +varBudgets[cat.id] || 0;
                const tl = trafficLight(spent, budget);
                if (spent === 0 && budget === 0) return;
                html += `<div class="category-item"><span class="dot ${tl}"></span><span style="font-size: 13px; flex: 1">${cat.icon} ${cat.label}</span><span class="category-amount">${fmt(spent)}<span> / ${fmt(budget)}</span></span></div>`;
            });
            html += `</div></div><div class="card"><div class="one-time-header"><div class="section-title" style="margin-bottom: 0">One-time expenses</div><button class="add-btn" onclick="addOneTime()">+ Add</button></div>`;
            if (data.oneTime.length === 0) html += '<div style="color: var(--muted); font-size: 12px; font-style: italic">No one-time expenses yet</div>';
            else {
                data.oneTime.forEach((item, i) => {
                    html += `<div class="one-time-item"><input type="text" placeholder="Label" value="${item.label}" onchange="updateOneTime(${i}, 'label', this.value)"><input type="number" placeholder="€" value="${item.amount}" onchange="updateOneTime(${i}, 'amount', this.value)"><button onclick="removeOneTime(${i})">×</button></div>`;
                });
                html += `<div class="one-time-total">Total: ${fmt(oneTimeTotal)} €</div>`;
            }
            html += `</div><div class="card"><div class="section-title">Notes</div><textarea rows="3" placeholder="Monthly notes, anomalies, things to remember…" onchange="updateNotes(this.value)">${data.notes}</textarea></div>`;
            document.getElementById('content').innerHTML = html;
        }

        function renderVariable() {
            const spending = data.spending;
            const varBudgets = data.varBudgets;
            let html = `<div style="font-size: 11px; color: var(--muted); margin-bottom: 4px">Update totals weekly. Enter running total for the month so far.</div>`;
            VAR_CATEGORIES.forEach(cat => {
                const spent = +spending[cat.id] || 0;
                const budget = +varBudgets[cat.id] || 0;
                const tl = trafficLight(spent, budget);
                const remaining = budget - spent;
                html += `<div class="card"><div class="row-between vertical"><div class="row-start"><span class="cat-icon">${cat.icon}</span><div class="cat-info ${remaining < 0 ? 'over' : ''}"><div>${cat.label}</div><div>${remaining >= 0 ? fmt(remaining) + ' € left' : fmt(Math.abs(remaining)) + ' € over'}</div></div></div><div style="text-align: right"><div style="display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-bottom: 4px"><span class="dot ${tl}"></span><span style="font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent)">${fmt(spent)} €</span></div><div style="font-size: 10px; color: var(--muted)">budget ${fmt(budget)} €</div></div></div><div class="progress-bar"><div class="progress-fill ${tl}" style="width: ${Math.min(pct(spent, budget), 100)}%"></div></div><div class="spending-row"><div class="spending-col"><div class="spending-col-label">Spent this month</div><input type="number" min="0" placeholder="0" value="${spending[cat.id]}" onchange="updateSpending('${cat.id}', this.value)"></div><div class="spending-col"><div class="spending-col-label">Monthly budget</div><input type="number" min="0" placeholder="0" value="${varBudgets[cat.id]}" onchange="updateBudget('${cat.id}', this.value)"></div></div></div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        function renderFixed() {
            let html = `<div style="font-size: 11px; color: var(--muted); margin-bottom: 4px">These repeat every month. Adjust if amounts change.</div>`;
            data.fixed.forEach((item, i) => {
                html += `<div class="card fixed-item"><span class="item-icon">${item.icon}</span><div style="flex: 1; min-width: 0"><div style="font-size: 13px">${item.label}</div></div><input type="number" class="item-input" value="${item.amount}" onchange="updateFixed(${i}, this.value)"><span class="item-currency">€</span></div>`;
            });
            const totalFixed = data.fixed.reduce((a,f) => a + (+f.amount||0), 0);
            html += `<div class="total-line"><span>Total fixed: </span><span>${fmtD(totalFixed)} €</span></div><div class="savings-header"><div class="section-title">💰 Savings — 20% bucket</div></div>`;
            (data.savings || SAVINGS_DEFAULTS).forEach((item, i) => {
                html += `<div class="card savings-item"><span class="item-icon">${item.icon}</span><div style="flex: 1"><div style="font-size: 13px">${item.label}</div></div><input type="number" class="item-input" value="${item.amount}" onchange="updateSavings(${i}, this.value)"><span class="item-currency">€</span></div>`;
            });
            const totalSavings = (data.savings || SAVINGS_DEFAULTS).reduce((a,s) => a + (+s.amount||0), 0);
            const totalIncome = Object.values(data.income).reduce((a,b) => a + (+b||0), 0);
            html += `<div class="savings-footer"><span>Total savings: <b style="color: var(--green)">${fmt(totalSavings)} €</b></span><span><b style="color: var(--green)">${((totalSavings/(totalIncome||1))*100).toFixed(1)}%</b> of income</span></div>`;
            document.getElementById('content').innerHTML = html;
        }

        function renderIncome() {
            const totalIncome = Object.values(data.income).reduce((a,b) => a + (+b||0), 0);
            const totalFixed = data.fixed.reduce((a,f) => a + (+f.amount||0), 0);
            const totalVarBudget = VAR_CATEGORIES.reduce((a,c) => a + (+data.varBudgets[c.id]||0), 0);
            const totalSavings = (data.savings || SAVINGS_DEFAULTS).reduce((a,s) => a + (+s.amount||0), 0);
            let html = ``;
            [["salary", "💼", "Ken salary (ALMIC OÜ)"], ["maternity", "🤱", "Alina maternity benefit"], ["childBenefit","👶","Child benefit"], ["rental", "🏠", "Rental — Vana-Kalamaja"]].forEach(([key, icon, label]) => {
                html += `<div class="card income-item"><span class="item-icon">${icon}</span><div style="flex: 1"><div style="font-size: 13px">${label}</div><small>monthly</small></div><input type="number" style="width: 100px; text-align: right; font-family: 'DM Mono', monospace; font-size: 14px" value="${data.income[key]}" onchange="updateIncome('${key}', this.value)"><span class="item-currency">€</span></div>`;
            });
            html += `<div class="total-line"><span>Total income: </span><span style="color: var(--green)">${fmtD(totalIncome)} €</span></div><div class="card"><div class="section-title">Income allocation</div>`;
            [["Fixed costs", totalFixed, "rgba(224, 82, 82, 0.6)"], ["Variable budget", totalVarBudget, "rgba(232, 184, 75, 0.6)"], ["Buffer (budgeted)", totalIncome - totalFixed - totalVarBudget - totalSavings, "rgba(76, 175, 125, 0.6)"]].forEach(([label, val, color]) => {
                html += `<div class="income-breakdown"><div class="breakdown-row"><span>${label}</span><span style="font-family: 'DM Mono', monospace">${fmt(val)} €</span></div><div class="breakdown-bar"><div class="breakdown-fill" style="width: ${Math.max(0, (val/totalIncome)*100)}%; background: ${color}"></div></div></div>`;
            });
            html += `</div>`;
            document.getElementById('content').innerHTML = html;
        }

        function renderCompare() {
            if (!prevData) {
                document.getElementById('content').innerHTML = `<div class="card"><div style="color: var(--muted); font-size: 13px; font-style: italic; text-align: center; padding: 20px 0">No data for previous month yet.</div></div>`;
                return;
            }
            const totalIncome = Object.values(data.income).reduce((a,b) => a + (+b||0), 0);
            const totalFixed = data.fixed.reduce((a,f) => a + (+f.amount||0), 0);
            const totalVarSpent = VAR_CATEGORIES.reduce((a,c) => a + (+data.spending[c.id]||0), 0);
            const totalSavings = (data.savings || SAVINGS_DEFAULTS).reduce((a,s) => a + (+s.amount||0), 0);
            const oneTimeTotal = data.oneTime.reduce((a,x) => a + (+x.amount||0), 0);
            const freeToSpend = totalIncome - totalFixed - totalVarSpent - totalSavings - oneTimeTotal;
            const prevIncome = Object.values(prevData.income).reduce((a,b) => a + (+b||0), 0);
            const prevFixed = prevData.fixed.reduce((a,f) => a + (+f.amount||0), 0);
            const prevVarSpent = VAR_CATEGORIES.reduce((a,c) => a + (+prevData.spending[c.id]||0), 0);
            const prevFree = prevIncome - prevFixed - prevVarSpent;
            const pm = month === 0 ? 11 : month - 1;
            let html = `<div class="card"><div class="section-title">Month overview</div>`;
            [["Income", totalIncome, prevIncome], ["Fixed", totalFixed, prevFixed], ["Variable", totalVarSpent, prevVarSpent], ["Free to spend", freeToSpend, prevFree]].forEach(([label, curr, prev]) => {
                const diff = curr - prev;
                const diffColor = diff === 0 ? 'var(--muted)' : (label==="Income"||label==="Free to spend") ? (diff>0?'var(--green)':'var(--red)') : (diff>0?'var(--red)':'var(--green)');
                html += `<div class="compare-item"><span class="compare-label">${label}</span><div class="compare-values"><span class="compare-prev">${MONTHS[pm]}: ${fmt(prev)}</span><span class="compare-curr">${fmt(curr)}</span><span class="compare-diff" style="color: ${diffColor}">${diff >= 0 ? '+' : ''}${fmt(diff)}</span></div></div>`;
            });
            html += `</div><div class="card"><div class="section-title">Variable spending by category</div>`;
            VAR_CATEGORIES.forEach(cat => {
                const curr = +data.spending[cat.id] || 0;
                const prev = +prevData.spending[cat.id] || 0;
                if (curr === 0 && prev === 0) return;
                const diff = curr - prev;
                html += `<div class="category-compare"><span class="cat-compare-icon">${cat.icon}</span><span class="cat-compare-label">${cat.label}</span><span style="font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted)">${MONTHS[pm]}: ${fmt(prev)}</span><span style="font-family: 'DM Mono', monospace; font-size: 12px">${fmt(curr)}</span><span style="font-family: 'DM Mono', monospace; font-size: 11px; width: 44px; text-align: right; color: ${diff === 0 ? 'var(--muted)' : diff > 0 ? 'var(--red)' : 'var(--green)'}">${diff > 0 ? '+' : ''}${fmt(diff)}</span></div>`;
            });
            html += `</div>`;
            document.getElementById('content').innerHTML = html;
        }

        function updateUI() { updateHeader(); renderContent(); }
        function updateIncome(key, value) { data.income[key] = value; updateData(data); }
        function updateFixed(index, value) { data.fixed[index].amount = value; updateData(data); }
        function updateSavings(index, value) { if (!data.savings) data.savings = [...SAVINGS_DEFAULTS]; data.savings[index].amount = value; updateData(data); }
        function updateSpending(catId, value) { data.spending[catId] = value; updateData(data); }
        function updateBudget(catId, value) { data.varBudgets[catId] = value; updateData(data); }
        function updateNotes(value) { data.notes = value; updateData(data); }
        function addOneTime() { data.oneTime.push({id: Date.now(), label: "", amount: ""}); updateData(data); }
        function updateOneTime(index, field, value) { data.oneTime[index][field] = value; updateData(data); }
        function removeOneTime(index) { data.oneTime.splice(index, 1); updateData(data); }

        load();
    </script>
</body>
</html>
